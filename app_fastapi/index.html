
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HINT AI - Clinical Trial Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .container {
            width: 90%; max-width: 900px;
            margin-top: 50px; padding-bottom: 50px;
        }
        .header {
            text-align: center; margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem; font-weight: 800;
            background: -webkit-linear-gradient(45deg, #60a5fa, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header p { color: var(--text-muted); font-size: 1.1rem; }
        
        /* Tabs */
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab {
            padding: 10px 20px; cursor: pointer; border-radius: 8px; font-weight: 600;
            background: rgba(255,255,255,0.05); color: var(--text-muted);
            transition: all 0.3s ease; border: 1px solid transparent;
        }
        .tab.active {
            background: rgba(59, 130, 246, 0.1); color: var(--primary);
            border-color: rgba(59, 130, 246, 0.3);
        }
        .tab:hover:not(.active) { background: rgba(255,255,255,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255, 0.05);
            border-radius: 20px; padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px; 
        }
        .upload-area {
            border: 2px dashed rgba(255,255,255, 0.2);
            border-radius: 12px; padding: 40px 20px;
            text-align: center; cursor: pointer; transition: all 0.3s ease;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary); background: rgba(59, 130, 246, 0.1);
        }
        .upload-area input { display: none; }
        .btn {
            background: var(--primary); color: white;
            border: none; padding: 12px 28px; border-radius: 8px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s; margin-top: 20px; width: 100%;
        }
        .btn:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(59,130,246,0.3); }
        .loader {
            display: none; border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary); border-radius: 50%;
            width: 30px; height: 30px; animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.85rem; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .badge.success { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .badge.fail { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        
        .progress-bar-container { width: 100%; background: rgba(255,255,255,0.1); border-radius: 10px; height: 10px; margin-top: 8px; overflow: hidden; }
        .progress-bar { height: 100%; border-radius: 10px; transition: width 1s ease-in-out; }
        
        /* Form fields */
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 6px; color: var(--text-main); font-size: 0.9rem; font-weight: 600; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: white; font-family: inherit; font-size: 0.95rem; box-sizing: border-box; resize: vertical;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); background: rgba(0,0,0,0.5); }
        .form-group select option { background: #1e293b; color: white; }
        
        #results-container { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>HINT AI Predictor</h1>
            <p>Predict Clinical Trial Outcomes with Hierarchical Interaction Networks</p>
        </div>
        
        <div class="tabs">
            <!-- <div class="tab active" onclick="switchTab('file')">CSV File Upload</div> -->
            <!-- <div class="tab" onclick="switchTab('manual')">Manual Text Input</div> -->
        </div>

        <div class="glass-card tab-content" id="tab-file">
            <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary); margin-bottom: 15px;">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <h3 style="margin: 0; font-weight: 600; font-size: 1.2rem;">Click to upload CSV or drag & drop</h3>
                <p style="margin-top: 8px; color: var(--text-muted); font-size: 0.95rem;">File must contain HINT required features</p>
                <input type="file" id="file-input" accept=".csv" onchange="handleFileSelect(event)">
            </div>
            <div id="selected-file" style="text-align:center; margin-top: 15px; color: var(--primary); font-weight:600;"></div>
            <button class="btn" id="analyze-btn" onclick="uploadFile()">Analyze Trial CSV</button>
        </div>

        <div class="glass-card tab-content active" id="tab-manual">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <!-- <div class="form-group">
                    <label>NCT ID</label>
                    <input type="text" id="m_nctid" value="NCT_TEST_001">
                </div> -->
                <div class="form-group">
                    <label>Phase</label>
                    <select id="m_phase">
                        <option value="phase 1">Phase 1</option>
                        <option value="phase 2">Phase 2</option>
                        <option value="phase 3">Phase 3</option>
                        <option value="phase 4">Phase 4</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Diseases </label>
                <input type="text" id="m_diseases" placeholder="질병명을 입력하세요(예: pancreatic cancer)">
            </div>
            <div class="form-group">
                <label>ICD-10 Codes </label>
                <input type="text" id="m_icdcodes" placeholder="질병코드를 입력하세요(예:B18.2)">
            </div>
            <div class="form-group">
                <label>Drugs </label>
                <input type="text" id="m_drugs" placeholder="약물명을 입력하세요(예:sofosbuvir)">
            </div>
            <div class="form-group">
                <label>SMILES </label>
                <textarea id="m_smiless" rows="2" placeholder="SMILES 구조식을 입력하세요(예:CNC(=O)C1=NC=CC(OC2=CC=C(NC(=O)NC3=CC(=C(Cl)C=C3)C(F)(F)F)C=C2)=C1)"></textarea>
            </div>
            <div class="form-group">
                <label>Protocol Criteria </label>
                <textarea id="m_criteria" rows="5" placeholder="프로토콜 기준을 작성해주세요"></textarea>
            </div>
            <button class="btn" id="analyze-manual-btn" onclick="submitManual()">입력 내용 분석</button>
        </div>
        
        <div class="loader" id="loader"></div>

        <div class="glass-card" id="results-container">
            <h2 style="margin-top:0; color: var(--text-main);">Prediction Results</h2>
            <table>
                <thead>
                    <tr>
                        <!-- <th>NCT ID</th> -->
                        <th>Predicted Outcome</th>
                        <th>Success Probability</th>
                    </tr>
                </thead>
                <tbody id="results-body">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let selectedFile = null;

        // function switchTab(tab) {
        //     document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        //     document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        //     event.target.classList.add('active');
        //     document.getElementById('tab-' + tab).classList.add('active');
        // }

        // File Drag & Drop Logic
        document.getElementById('drop-zone').addEventListener('dragover', (e) => { e.preventDefault(); e.currentTarget.classList.add('dragover'); });
        document.getElementById('drop-zone').addEventListener('dragleave', (e) => { e.preventDefault(); e.currentTarget.classList.remove('dragover'); });
        document.getElementById('drop-zone').addEventListener('drop', (e) => {
            e.preventDefault(); e.currentTarget.classList.remove('dragover');
            if(e.dataTransfer.files.length) {
                selectedFile = e.dataTransfer.files[0];
                document.getElementById('selected-file').innerText = "Selected File: " + selectedFile.name;
            }
        });

        function handleFileSelect(e) {
            if(e.target.files.length) {
                selectedFile = e.target.files[0];
                document.getElementById('selected-file').innerText = "Selected File: " + selectedFile.name;
            }
        }

        // async function uploadFile() {
        //     if(!selectedFile) { alert("Please select a CSV file first!"); return; }
        //     await processRequest('/predict', (() => {
        //         const fd = new FormData();
        //         fd.append('file', selectedFile);
        //         return { method: 'POST', body: fd };
        //     })());
        // } 

        async function submitManual() {
            // 사용자가 입력한 순수 텍스트 가져오기
            const rawDiseases = document.getElementById('m_diseases').value.trim();
            const rawIcd = document.getElementById('m_icdcodes').value.trim();
            const rawDrugs = document.getElementById('m_drugs').value.trim();
            const rawSmiles = document.getElementById('m_smiless').value.trim();
            const criteria = document.getElementById('m_criteria').value;
            
            // 모델이 원하는 형식으로 감싸기: "값" -> "['값']"
            const data = {
                // nctid: "NCT00000000",
                phase: document.getElementById('m_phase').value,
                diseases: `['${rawDiseases}']`,
                icdcodes: `['${rawIcd}']`,
                drugs: `['${rawDrugs}']`,
                smiless: `['${rawSmiles}']`,
                criteria: criteria
            };

            console.log("Sending data:", data); // 전송되는 데이터 형식을 콘솔에서 확인 가능

            await processRequest('/predict_manual', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        }

        async function processRequest(url, options) {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('results-container').style.display = 'none';
            try {
                const response = await fetch(url, options);
                const data = await response.json();
                renderResults(data.results);
            } catch (error) {
                alert("An error occurred during prediction.");
                console.error(error);
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }
        // 5. 결과 렌더링 함수 수정 (row.nctid 에러 방지)
        function renderResults(results) {
            console.log("렌더링 시작:", results);

            // 1. 단일 객체면 배열로 변환
            if (results && !Array.isArray(results)) {
                results = [results];
            }

            // 2. tbody 찾기 (못 찾으면 에러 메시지 출력)
            const tbody = document.getElementById('results-body');
            if (!tbody) {
                alert("HTML에 'results-body' ID를 가진 태그가 없습니다!");
                return;
            }
            tbody.innerHTML = '';

            // 3. 데이터가 없으면 중단
            if (!results || results.length === 0) {
                console.warn("데이터가 비어있습니다.");
                return;
            }

            // 4. 테이블 행 생성
            results.forEach(row => {
                const tr = document.createElement('tr');
                const percent = (row.success_probability * 100).toFixed(1);
                const badgeClass = row.prediction_label === 1 ? 'success' : 'fail';
                const badgeText = row.prediction_label === 1 ? 'Expected Success' : 'High Risk';
                const barColor = row.prediction_label === 1 ? 'var(--success)' : 'var(--danger)';

                tr.innerHTML = `
                    <td style="vertical-align: middle;> 
                        <span class="badge ${badgeClass}">${badgeText}</span></td>
                    <td>
                        <div style="display:flex; justify-content:space-between; font-size:0.9rem; margin-bottom: 5px;">
                            <span>${percent}%</span>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" style="width: 0%; background: ${barColor};" data-width="${percent}%"></div>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // 5. 결과 박스 보여주기 (더 강력한 방식)
        const container = document.getElementById('results-container');
        if (container) {
            // 투명도와 디스플레이를 동시에 강제로 설정
            container.style.display = 'block'; 
            container.style.setProperty('display', 'block', 'important');
            container.style.opacity = '1';
            container.style.visibility = 'visible';

            console.log("결과 컨테이너 표시 완료");
            
            // [추가] 결과가 나타난 곳으로 부드럽게 스크롤 이동
            container.scrollIntoView({ behavior: 'smooth', block: 'start' });

            // 애니메이션 효과
            setTimeout(() => {
                document.querySelectorAll('.progress-bar').forEach(bar => {
                    bar.style.width = bar.getAttribute('data-width');
                });
            }, 150); // 시간을 조금 더 늘려 안정성 확보
        } else {
            console.error("ID가 'results-container'인 요소를 찾을 수 없습니다.");
        }
        }
    </script>
</body>
</html>
